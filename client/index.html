<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Dungeon Crawler</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0c10;
        color: #c7cbd6;
        font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        overflow: hidden;
        /* Don't let the browser bounce-scroll or rubber-band on touch drags. */
        overscroll-behavior: none;
      }
      /* The game fills the whole window — no frame, title, or chrome. */
      #game {
        position: fixed;
        inset: 0;
        /* Touches drive the game, not browser scroll/zoom; no long-press menus
           or text selection on the canvas. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #game canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
