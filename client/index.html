<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Dungeon Crawler</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0c10;
        --text: #c7cbd6;
        --muted: #8a91a3;
        --accent: #ffe066;
        --panel: #15171f;
        --line: #2a2e3a;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        overflow: hidden;
        /* Don't let the browser bounce-scroll or rubber-band on touch drags. */
        overscroll-behavior: none;
      }
      /* The game fills the whole window — no frame, title, or chrome. */
      #game {
        position: fixed;
        inset: 0;
        /* Touches drive the game, not browser scroll/zoom; no long-press menus
           or text selection on the canvas. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #game canvas {
        display: block;
      }

      /* --- Lobby menu (shown before connecting) --- */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: radial-gradient(circle at 50% 35%, #15131f 0%, #0b0c10 70%);
      }
      .overlay[hidden] {
        display: none;
      }
      .panel {
        width: min(360px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 22px 20px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
      }
      .panel h1 {
        margin: 0 0 18px;
        font-size: 20px;
        letter-spacing: 0.5px;
        color: var(--accent);
        text-align: center;
      }
      .panel label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 14px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 6px;
        padding: 12px;
        font: inherit;
        color: var(--text);
        background: #0e1016;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #20242f;
        color: var(--text);
        padding: 12px 14px;
      }
      button:hover {
        border-color: #3a4150;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      button.primary {
        width: 100%;
        background: var(--accent);
        color: #1a1700;
        border-color: var(--accent);
        font-weight: bold;
      }
      .divider {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        margin: 16px 0 12px;
      }
      .hint {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        margin: -6px 0 16px;
      }
      .hint b {
        color: var(--accent);
        letter-spacing: 2px;
      }
      .hint[hidden],
      .divider[hidden],
      #create[hidden] {
        display: none;
      }
      .joinrow {
        display: flex;
        gap: 8px;
      }
      .joinrow input {
        margin-top: 0;
        text-transform: uppercase;
        letter-spacing: 4px;
        text-align: center;
        font-size: 18px;
      }
      .joinrow button {
        flex: 0 0 auto;
      }
      .error {
        color: #ff6b81;
        font-size: 13px;
        margin: 14px 0 0;
        text-align: center;
      }
      .error[hidden] {
        display: none;
      }

      /* --- In-game room bar (share the code) --- */
      #roombar {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        background: rgba(21, 23, 31, 0.85);
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 13px;
      }
      #roombar[hidden] {
        display: none;
      }
      .rb-label {
        color: var(--muted);
      }
      .rb-code {
        color: var(--accent);
        font-weight: bold;
        letter-spacing: 3px;
        user-select: text;
      }
      .rb-copy {
        padding: 4px 10px;
        font-size: 12px;
      }

      /* --- In-game HUD: health + loot haul --- */
      #hud {
        position: fixed;
        left: 8px;
        bottom: 8px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px 10px;
        background: rgba(21, 23, 31, 0.8);
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 12px;
        pointer-events: none;
      }
      #hud[hidden] {
        display: none;
      }
      .hud-hp {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .hud-hp-label {
        color: var(--muted);
      }
      .hud-hp-bar {
        display: inline-block;
        width: 120px;
        height: 8px;
        background: #2a2e3a;
        border-radius: 4px;
        overflow: hidden;
      }
      #hud-hp-fill {
        display: block;
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff5d73 0%, #ffd65c 50%, #7cf36b 100%);
        background-size: 120px 100%;
        transition: width 120ms linear;
      }
      .hud-loot {
        display: flex;
        gap: 10px;
        font-weight: bold;
      }
      .hud-loot span::before {
        content: "◆ ";
      }
      .r-common {
        color: #b8c0cc;
      }
      .r-uncommon {
        color: #7cf36b;
      }
      .r-rare {
        color: #4ec9ff;
      }
      .r-epic {
        color: #c08bff;
      }
      .r-legendary {
        color: #ffb028;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <!-- Pre-game lobby: create a room or join an existing one by code. -->
    <div id="menu" class="overlay">
      <div class="panel">
        <h1>⚔ Dungeon Crawler</h1>
        <p id="hint" class="hint" hidden></p>
        <label>
          Name
          <input id="name" maxlength="16" autocomplete="off" />
        </label>
        <button id="create" class="primary">Create Room</button>
        <div id="ordivider" class="divider">— or join with a code —</div>
        <div class="joinrow">
          <input
            id="code"
            placeholder="CODE"
            maxlength="4"
            autocapitalize="characters"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            inputmode="text"
          />
          <button id="join">Join</button>
        </div>
        <p id="error" class="error" hidden></p>
      </div>
    </div>

    <!-- In-game: the code others use to join this session. -->
    <div id="roombar" hidden>
      <span class="rb-label">Room</span>
      <span id="roomcode" class="rb-code">····</span>
      <button id="copy" class="rb-copy">Copy link</button>
    </div>

    <!-- In-game HUD: local hero's health + loot haul by rarity. -->
    <div id="hud" hidden>
      <div class="hud-hp">
        <span class="hud-hp-label">HP</span>
        <span class="hud-hp-bar"><i id="hud-hp-fill"></i></span>
      </div>
      <div class="hud-loot">
        <span class="r-common" id="loot-common">0</span>
        <span class="r-uncommon" id="loot-uncommon">0</span>
        <span class="r-rare" id="loot-rare">0</span>
        <span class="r-epic" id="loot-epic">0</span>
        <span class="r-legendary" id="loot-legendary">0</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
