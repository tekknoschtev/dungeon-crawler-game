<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Dungeon Crawler</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0c10;
        --text: #c7cbd6;
        --muted: #8a91a3;
        --accent: #ffe066;
        --panel: #15171f;
        --line: #2a2e3a;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        overflow: hidden;
        /* Don't let the browser bounce-scroll or rubber-band on touch drags. */
        overscroll-behavior: none;
      }
      /* The game fills the whole window — no frame, title, or chrome. */
      #game {
        position: fixed;
        inset: 0;
        /* Touches drive the game, not browser scroll/zoom; no long-press menus
           or text selection on the canvas. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #game canvas {
        display: block;
      }

      /* --- Lobby menu (shown before connecting) --- */
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: radial-gradient(circle at 50% 35%, #15131f 0%, #0b0c10 70%);
      }
      .overlay[hidden] {
        display: none;
      }
      .panel {
        width: min(360px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 22px 20px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
      }
      .panel h1 {
        margin: 0 0 18px;
        font-size: 20px;
        letter-spacing: 0.5px;
        color: var(--accent);
        text-align: center;
      }
      .panel label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 14px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 6px;
        padding: 12px;
        font: inherit;
        color: var(--text);
        background: #0e1016;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #20242f;
        color: var(--text);
        padding: 12px 14px;
      }
      button:hover {
        border-color: #3a4150;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      button.primary {
        width: 100%;
        background: var(--accent);
        color: #1a1700;
        border-color: var(--accent);
        font-weight: bold;
      }
      .divider {
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        margin: 16px 0 12px;
      }
      .hint {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        margin: -6px 0 16px;
      }
      .hint b {
        color: var(--accent);
        letter-spacing: 2px;
      }
      .hint[hidden],
      .divider[hidden],
      #create[hidden] {
        display: none;
      }
      /* Hero color picker (lobby): a live, tinted hero sprite you arrow through. */
      .picker-label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .hero-picker {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 12px;
      }
      .color-swatch {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        border: 1px solid var(--line);
      }
      .hero-arrow {
        width: 38px;
        height: 38px;
        font-size: 20px;
        line-height: 1;
        padding: 0;
      }
      .hero-canvas {
        width: 72px;
        height: 72px;
        image-rendering: pixelated;
        background: #0e1016;
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .joinrow {
        display: flex;
        gap: 8px;
      }
      .joinrow input {
        margin-top: 0;
        text-transform: uppercase;
        letter-spacing: 4px;
        text-align: center;
        font-size: 18px;
      }
      .joinrow button {
        flex: 0 0 auto;
      }
      .error {
        color: #ff6b81;
        font-size: 13px;
        margin: 14px 0 0;
        text-align: center;
      }
      .error[hidden] {
        display: none;
      }

      /* --- In-game room bar (share the code) --- */
      #roombar {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        background: rgba(21, 23, 31, 0.85);
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 13px;
      }
      #roombar[hidden] {
        display: none;
      }
      .rb-label {
        color: var(--muted);
      }
      .rb-code {
        color: var(--accent);
        font-weight: bold;
        letter-spacing: 3px;
        user-select: text;
      }
      .rb-copy {
        padding: 4px 10px;
        font-size: 12px;
      }

      /* --- In-game HUD: health + loot haul --- */
      #hud {
        position: fixed;
        left: 8px;
        bottom: 8px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px 10px;
        background: rgba(21, 23, 31, 0.8);
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 12px;
        pointer-events: none;
      }
      #hud[hidden] {
        display: none;
      }
      /* --- Run HUD: floor + pressure (top-left, clear of the centered share bar) --- */
      #run-hud {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        background: rgba(21, 23, 31, 0.8);
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 12px;
        pointer-events: none;
      }
      #run-hud[hidden] {
        display: none;
      }
      #run-depth {
        color: #e6e9ef;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .heat-bar {
        display: inline-block;
        width: 80px;
        height: 7px;
        background: #2a2e3a;
        border-radius: 4px;
        overflow: hidden;
      }
      #run-heat-fill {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4ec9ff 0%, #ffd65c 60%, #ff5d73 100%);
        transition: width 200ms linear;
      }
      #descend-hint {
        position: fixed;
        top: 50px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 4px 10px;
        background: rgba(13, 30, 28, 0.85);
        border: 1px solid #2f6f66;
        border-radius: 8px;
        color: #9ffff0;
        font-size: 12px;
        pointer-events: none;
      }
      #descend-hint[hidden] {
        display: none;
      }
      .hud-hp {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .hud-hp-label {
        color: var(--muted);
      }
      .hud-hp-bar {
        display: inline-block;
        width: 120px;
        height: 8px;
        background: #2a2e3a;
        border-radius: 4px;
        overflow: hidden;
      }
      #hud-hp-fill {
        display: block;
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff5d73 0%, #ffd65c 50%, #7cf36b 100%);
        background-size: 120px 100%;
        transition: width 120ms linear;
      }
      .hud-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .chip {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        font-size: 15px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--line);
      }
      .chip[hidden] {
        display: none;
      }
      #hud-heal {
        color: #ff6b81;
      }
      #hud-heal.empty {
        color: #444a57;
        opacity: 0.5;
      }
      .chip.atk {
        color: #ff9aa6;
      }
      .chip.def {
        color: #9ad8ff;
      }
      .chip i {
        position: absolute;
        left: 2px;
        bottom: 2px;
        height: 2px;
        width: 100%;
        background: currentColor;
        border-radius: 1px;
      }
      /* Weapon-buff icon: one 16px frame cropped from the Tiny Dungeon sheet
         (12 columns). background-position is set per weapon in updateHud. */
      .chip .wpn {
        width: 20px;
        height: 20px;
        background-image: url(/assets/tiny-dungeon/tilemap_packed.png);
        background-size: 240px auto;
        image-rendering: pixelated;
      }
      .chip b {
        position: absolute;
        top: -5px;
        right: -5px;
        font-size: 10px;
        font-weight: bold;
        line-height: 1;
        padding: 1px 3px;
        border-radius: 6px;
        background: #2a2e3a;
        color: #fff;
      }
      .chip.empty b {
        opacity: 0.4;
      }

      /* --- Transient toasts: a hero joins or leaves the dungeon --- */
      #toasts {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 11;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: flex-end;
        pointer-events: none;
      }
      .toast {
        padding: 6px 12px;
        background: rgba(21, 23, 31, 0.9);
        border: 1px solid var(--line);
        border-left-width: 3px;
        border-radius: 8px;
        font-size: 13px;
        color: var(--text);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
        /* Start off-screen-ish + transparent; .show animates it in. */
        opacity: 0;
        transform: translateX(12px);
        transition: opacity 180ms ease, transform 180ms ease;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(0);
      }
      .toast.join {
        border-left-color: #7cf36b;
      }
      .toast.leave {
        border-left-color: #ff6b81;
      }
      .toast.death {
        border-left-color: #8a91a3;
      }
      .toast .who {
        color: var(--accent);
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <!-- Pre-game lobby: create a room or join an existing one by code. -->
    <div id="menu" class="overlay">
      <div class="panel">
        <h1>⚔ Dungeon Crawler</h1>
        <p id="hint" class="hint" hidden></p>
        <label>
          Name
          <input id="name" maxlength="16" autocomplete="off" />
        </label>
        <span class="picker-label">Hero</span>
        <div class="hero-picker">
          <button id="hero-prev" class="hero-arrow" type="button" aria-label="Previous hero">‹</button>
          <canvas id="hero-canvas" class="hero-canvas" width="72" height="72" aria-label="Hero preview"></canvas>
          <button id="hero-next" class="hero-arrow" type="button" aria-label="Next hero">›</button>
        </div>
        <span class="picker-label">Color</span>
        <div class="hero-picker">
          <button id="color-prev" class="hero-arrow" type="button" aria-label="Previous color">‹</button>
          <div id="color-swatch" class="color-swatch" aria-label="Color preview"></div>
          <button id="color-next" class="hero-arrow" type="button" aria-label="Next color">›</button>
        </div>
        <button id="create" class="primary">Create Room</button>
        <div id="ordivider" class="divider">— or join with a code —</div>
        <div class="joinrow">
          <input
            id="code"
            placeholder="CODE"
            maxlength="4"
            autocapitalize="characters"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            inputmode="text"
          />
          <button id="join">Join</button>
        </div>
        <p id="error" class="error" hidden></p>
      </div>
    </div>

    <!-- In-game: the code others use to join this session. -->
    <div id="roombar" hidden>
      <span class="rb-label">Room</span>
      <span id="roomcode" class="rb-code">····</span>
      <button id="copy" class="rb-copy">Copy link</button>
    </div>

    <!-- Transient join/leave toasts (populated by GameScene). -->
    <div id="toasts" aria-live="polite"></div>

    <!-- Run HUD: current floor + the floor's rising pressure ("heat"). -->
    <div id="run-hud" hidden>
      <span id="run-depth">Floor 1</span>
      <span class="heat-bar" title="floor pressure"><i id="run-heat-fill"></i></span>
    </div>
    <!-- Shown while a hero stands on the descent exit. -->
    <div id="descend-hint" hidden>▼ Hold here to descend</div>

    <!-- In-game HUD: local hero's health + loot haul by rarity. -->
    <div id="hud" hidden>
      <div class="hud-hp">
        <span class="hud-hp-label">HP</span>
        <span class="hud-hp-bar"><i id="hud-hp-fill"></i></span>
      </div>
      <div class="hud-row">
        <span id="hud-heal" class="chip empty" title="no heals">❤<b id="hud-heal-n">0</b></span>
        <span id="hud-atk" class="chip atk" hidden><span class="wpn" id="hud-atk-icon"></span><i></i><b></b></span>
        <span id="hud-def" class="chip def" hidden>🛡<i></i><b></b></span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
